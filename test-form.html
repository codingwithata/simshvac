<!DOCTYPE html>
<html>
<head><title>Form Test</title></head>
<body>
  <h1>Web3Forms Test</h1>
  <p id="status">Click the button to send a test submission...</p>
  <button id="testBtn" style="padding:20px 40px;font-size:18px;cursor:pointer;">
    Send Test
  </button>

  <script>
    document.getElementById('testBtn').addEventListener('click', async () => {
      const status = document.getElementById('status');
      status.textContent = 'Sending...';

      try {
        const response = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({
            access_key: 'dc07fcbd-033f-4a0c-89b6-7382372feb12',
            name: 'Test User',
            email: 'test@example.com',
            phone: '555-000-0000',
            subject: 'TEST - Sid HVAC Form',
            message: 'This is a test. If you see this email, the form works!'
          })
        });

        const data = await response.json();
        status.textContent = JSON.stringify(data, null, 2);
        status.style.color = data.success ? 'green' : 'red';
      } catch (err) {
        status.textContent = 'ERROR: ' + err.message;
        status.style.color = 'red';
      }
    });
  </script>
</body>
</html>
